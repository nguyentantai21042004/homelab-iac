---
# Tasks for minio role
# Creates stack directories, templates .env + docker-compose,
# starts MinIO container, and waits for ports.
# NOTE: Docker install, kernel tuning, and data disk are handled by separate roles.

- name: Create storage stack directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ storage_stack_path }}"
    - "{{ storage_stack_path }}/config"
    - "{{ storage_data_path }}/minio"

- name: Template environment file
  template:
    src: .env.j2
    dest: "{{ storage_stack_path }}/.env"
    mode: "0600"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"

- name: Template docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ storage_stack_path }}/docker-compose.yml"
    mode: "0644"

- name: Stop and remove Zot container if running (migration cleanup)
  shell: |
    docker stop zot-registry 2>/dev/null || true
    docker rm zot-registry 2>/dev/null || true
  changed_when: false

- name: Remove Zot leftover files (migration cleanup)
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ storage_stack_path }}/zot-config.json"
    - "{{ storage_stack_path }}/htpasswd"

- name: Stop existing containers
  shell: |
    cd {{ storage_stack_path }}
    docker-compose down || true
  register: docker_stop_result
  changed_when: "'Stopping' in docker_stop_result.stdout or 'Removing' in docker_stop_result.stdout"

- name: Start MinIO containers
  shell: |
    cd {{ storage_stack_path }}
    docker-compose up -d
  register: docker_compose_result
  changed_when: "'Creating' in docker_compose_result.stdout or 'Starting' in docker_compose_result.stdout"

- name: Wait for MinIO to be ready
  wait_for:
    port: "{{ minio_port }}"
    delay: 10
    timeout: 60

- name: Remove old zot-registry bucket from MinIO (migration cleanup)
  shell: |
    # Wait for docker-compose network to be ready
    sleep 5
    docker exec -i minio-mc sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 {{ minio_root_user }} {{ minio_root_password }} &&
      /usr/bin/mc rb --force myminio/zot-registry 2>/dev/null || true
    " || true
  changed_when: false

- name: Show services status
  debug:
    msg: |
      Object Storage Services are running!

      MinIO Console: http://{{ ansible_host }}:9001
      MinIO API: http://{{ ansible_host }}:{{ minio_port }}

      Credentials:
      - MinIO: {{ minio_root_user }} / {{ minio_root_password }}

      Data path: {{ storage_data_path }}/minio
      Stack path: {{ storage_stack_path }}
